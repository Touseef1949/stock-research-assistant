# Gitleaks config — production-grade secrets detection
# Run: gitleaks detect -c .gitleaks.toml

[[rules]]
id = "generic-api-key"
description = "Generic API key pattern"
regex = '''(?i)(api[_-]?key|secret|token|password|auth)\s*[:=]\s*['"][A-Za-z0-9_\-]{15,}['"]'''
tags = ["api-key", "secret"]

[[rules]]
id = "sk-prefix-key"
description = "OpenAI/DeepSeek style API key"
regex = '''sk-[A-Za-z0-9]{20,}'''
tags = ["api-key"]

[allowlist]
description = "Known safe files"
paths = [
  '''tests/.*''',
  '''\.streamlit/secrets\.toml''',
  '''\.github/.*''',
]
